# Test Configuration
logging:
  config: classpath:logback-spring.xml
spring:
  application:
    name: awin-test-backend-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        default_schema: awin_schema
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    schemas: awin_schema
    create-schemas: true
  security:
    user:
      name: admin
      password: password
